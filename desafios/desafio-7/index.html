<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid layout</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: 1fr 1fr 9fr 1fr;
            grid-template-columns: 5fr 1fr;
            text-align: center;
        }

        .caixas {
            padding: 7px;
            border: 2px solid black;
        }

        #topo {
            background-color: rgb(77, 77, 158);
            color: white;
            grid-area: 1 / 1 / 2 / -1;
        }

        #menu {
            background-color: rgb(255, 0, 242);
            color: white;
            grid-area: 2 / 1 / 3 / -1;
        }

        #principal {
            background-color: rgb(180, 67, 67);
            color: white;
           grid-area: 3 / 1 / 4 / -2;
        }

        #secundario {
            background-color: rgb(83, 177, 125);
            color: white;
           grid-area: 3 / -2 / 4 / -1;
        }

        #rodape {
            background-color: rgb(201, 177, 46);
            color: white;
          grid-area: 4 / 1 / 5 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header id="topo" class="caixas">topo</header>
        <nav id="menu" class="caixas">menu</nav>
        <main id="principal" class="caixas">principal</main>
        <aside id="secundario" class="caixas">secundario</aside>
        <footer id="rodape" class="caixas">rodape</footer>
    </div>
</body>
</html>
