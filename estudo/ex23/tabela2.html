<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela grande</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        .destaque {
            background-color: gray;
            color: white;
        }

        .numero {
            text-align: right;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <table>
        <thead class="destaque">
            <tr>
                <th>Unidade Federativa</th>
                <th>População</th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>Acre</td>
                <td class="numero">830 018</td>
            </tr>
            <tr>
                <td>Alagoas</td>
                <td class="numero">27 767,7</td>
            </tr>

            <tr>
                <td>Amapá</td>
                <td class="numero">733 759</td>
            </tr>

            <tr>
                <td>Amazonas</td>
                <td class="numero">3 941 613</td>
            </tr>

            <tr>
                <td>Bahia</td>
                <td class="numero">14 141 626</td>
            </tr>

            <tr>
                <td>Ceará</td>
                <td class="numero">8 794 957</td>
            </tr>

            <tr>
                <td>Distrito Federal</td>
                <td class="numero">2 817 381</td>
            </tr>

            <tr>
                <td>Espírito Santo</td>
                <td class="numero">3 833 712</td>
            </tr>

            <tr>
                <td>Goiás</td>
                <td class="numero">7 056 495</td>
            </tr>

            <tr>
                <td>Maranhão</td>
                <td class="numero">6 755 805</td>
            </tr>
        </tbody>

        <tfoot class="destaque">
            <tr>
                <th>Total de habitantes</th>
                <td><strong>00000</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
