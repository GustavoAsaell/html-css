<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
        }

        .destaque {
            background-color: darkgray;
        }

        td {
            border:1px solid black;
            
            padding: 10px;
        }

        .foco {
            background-color: yellow;
        }

    </style>
</head>
<body>

    <h1>Primera tabela</h1>

    <table>

        <tr>
            <td>A1</td>
            <td>B1</td>
            <td class="foco">C1</td>
        </tr>

        <tr class="destaque">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

    </table>
</body>
</html>
