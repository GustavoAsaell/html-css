<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.6em;
        }

        fieldset {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1>Telefone e E-mail</h1>
    <fieldset>
        <form action="#" method="get">
            <p>
                <label for="iemail">E-mail</label>
                <input type="email" name="email" id="iemail" required autocomplete="on" placeholder="Digite seu e-mail">
            </p>
            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" autocomplete="on" placeholder="Digite seu telefone" pattern="^\(\d{2}\)\d{4,5}-\d{4}$">
            </p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
    </fieldset>
</body>
</html>
