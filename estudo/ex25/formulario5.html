<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="#" method="get">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="im" checked><label for="im">Homem</label>
            <input type="radio" name="sexo" id="if"><label for="if">Mulher</label> 
        </fieldset>

        <fieldset>
            <legend>Esportes favoritos</legend>

            <input type="checkbox" name="efut" id="iefut" checked><label for="iefut">Futebol</label> <br>
            <input type="checkbox" name="ebas" id="iebas"><label for="iebas">Basquete</label> <br>
            <input type="checkbox" name="evo" id="ievo"><label for="ievo">Volei</label> <br>
            <input type="checkbox" name="enat" id="ienat"><label for="ienat">Natação</label> <br>
            <input type="checkbox" name="eten" id="ieten"><label for="ieten">Tênis</label> <br>
            <input type="checkbox" name="ehand" id="iehand"><label for="iehand">Handbol</label> <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </fieldset>
    </form>
</body>
</html>
