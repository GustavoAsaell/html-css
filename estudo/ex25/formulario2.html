<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>Formulario de usuario</h1>
    <form action="cadastro.php" method="post">
        <p> 
            <label for="iusuario">Usuario: </label><input type="text" name="usuario" id="iusuario" required minlength="5" maxlength="30" placeholder="digite o usuário">
        </p>
        <p> 
            <label for="isenha">Senha:</label> <input type="password" name="senha" id="isenha" required minlength="8" maxlength="12" placeholder="min 8 caracteres">

        <p><input type="submit" value="Enviar"> <input type="reset" value="Limpar"></p>
        

    </form>
</body>
