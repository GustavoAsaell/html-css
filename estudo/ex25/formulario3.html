<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulários</title>
    <style>
       body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1.2em;
        font-weight: bolder;
       }

       input {
        font-size: 1.2em;
       }

    </style>
</head>
<body>
    <h1>Teste de formulário</h1>

    <form action="cadastro." method="get">

        <p>
            <label for="inome">Nome:</label>

            <input type="text" name="nome" id="inome" autocomplete="name" placeholder="Nome completo" required>
        </p>

        <p>
            <label for="imedia">Média:</label>
            
            <input type="number" name="media" id="imedia" min="0" max="10" step=".1" placeholder="média" required>
        </p>

        <p>
             <label for="iano-mes">Ano letivo:</label>
             
             <input type="month" name="ano-mes" id="iano-mes" autocomplete="bday-month" required value="2010-02">
        </p>

        <p> 
            
            <label for="idia">Dia da prova:</label>

            <input type="date" name="dia" id="idia" required autocomplete="bday-day" value="2010-05-31">
        </p>

        <p>
            <label for="ihora">Hora da prova:</label>
        
            <input type="time" name="hora" id="ihora">
        </p>

        <p>
            <input type="submit" value="Enviar"> 
            
            <input type="reset" value="Limpar">
        </p>

        
    </form>
</body>
</html>
