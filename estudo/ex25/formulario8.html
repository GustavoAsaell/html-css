<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="#">
        <p> 
            <label for="in1">Número 1:</label>
            <input type="number" name="n1" id="in1" min="1" max="10" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value) - Number(in3.value)">
        </p>
        <p>
            <label for="in2">Número 2:</label>
            <input type="number" name="n2" id="in2" min="1" max="10" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value) - Number(in3.value)">
        </p>

        <p>
            <label for="in3">Número 3:</label>
            <input type="number" name="n3" id="in3" min="1" max="10" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value) - Number(in3.value)">
        </p>

        <p>
            <label for="isoma">Soma:</label>
            <output id="isoma">0</output>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
