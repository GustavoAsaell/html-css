<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando hover</title>
    <style>
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
        }

        div:hover{
            color: rgb(139, 20, 20);
        }
    </style>
</head>
<body>
    <h1>usando hover</h1>
    <div>olha o texto
        <p>TEXTO ESCONDIDO...</p>
    </div>
</body>
</html>
