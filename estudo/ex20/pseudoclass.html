<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando div</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        div{
            display: inline-block;
            background-color: rgb(188, 198, 207);
            width: 200px;
            height: 200px;
            border: 1px solid black;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
        }
        div:hover {
            background-color: yellowgreen;
        }
    </style>
</head>
<body>
    <div>1
        <p>texto 1</p>
    </div>
    <div>2
        <p>texto 2</p>
    </div>
    <div>3
        <p>texto 3</p>
    </div>
</body>
</html>
