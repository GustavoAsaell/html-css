<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid areas</title>
    <style>
        .container {
            display: grid;
            grid-template: repeat(3, 100px) / repeat(4, 1fr);
        }

        .caixa1 {
            background-color: rgb(96, 96, 214);
            color: white;
            text-align: center;
            border: 3px solid black;
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 5;
        }

        .caixa2 {
            background-color: rgb(184, 70, 70);
            color: white;
            text-align: center;
            border: 3px solid black;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 3;
        }

        .caixa3 {
            background-color: rgb(89, 177, 89);
            color: white;
            text-align: center;
            border: 3px solid black;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 3;
            grid-column-end: 5;
        }
    </style>
</head>
<body>
    <div class="container">
            <div class="caixa1">caixa 1</div>
            <div class="caixa2">caixa 2</div>
            <div class="caixa3">caixa 3</div>
    </div>
</body>
</html>
