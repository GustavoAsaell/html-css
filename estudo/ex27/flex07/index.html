<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>flex box </title>
    <style>
        div.container {
            background-color: blue;
            display: flex;
        }

        div.items {
            background-color: rgb(255, 0, 234);
            border: 1px solid black;
            padding: 20px;
        }

        #i1 {
            order: 9;
        }

        #i2 {
            order: -1;
        }

        #i3 {
            order: 8;
        }

        #i4 {
            order: 2;
        }

        #i5 {
            order: 0;
        }

        #i6 {
            order: -15;
        }

        #i7 {
            order: 6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="i1">A</div>
        <div class="items" id="i2">B</div>
        <div class="items" id="i3">C</div>
        <div class="items" id="i4">D</div>
        <div class="items" id="i5">E</div>
        <div class="items" id="i6">F</div>
        <div class="items" id="i7">G</div>
    </div>
</body>
</html>
